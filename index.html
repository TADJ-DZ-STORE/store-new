<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 DE STORE</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
color:white;
background:#000;
overflow-x:hidden;
}

/* HERO FULL SCREEN */
.hero{
height:100vh;
width:100%;
background:
linear-gradient(120deg, rgba(0,0,0,0.75), rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
padding:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:1000;
}

.logo{
text-align:center;
font-size:34px;
font-weight:bold;
color:#00ff88;
letter-spacing:2px;
}

.logo span{
color:#ffd700;
}

/* HERO CONTENT */
.hero-content{
max-width:700px;
padding:20px;
animation:fadeIn 1.2s ease;
}

.hero h1{
font-size:60px;
margin-bottom:15px;
text-shadow:0 0 20px rgba(0,255,136,0.3);
}

.hero p{
font-size:20px;
color:#ddd;
margin-bottom:25px;
}

/* BUTTON */
.btn{
display:inline-block;
padding:14px 35px;
background:linear-gradient(135deg,#00ff88,#00c853);
color:#000;
font-weight:bold;
border-radius:12px;
text-decoration:none;
transition:0.3s;
box-shadow:0 0 20px rgba(0,255,136,0.2);
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(0,255,136,0.4);
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* GLOW EFFECT BACKGROUND */
.hero::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#00ff88;
filter:blur(150px);
opacity:0.15;
border-radius:50%;
top:20%;
left:10%;
}

/* MOBILE */
@media(max-width:768px){

.hero h1{
font-size:40px;
}

.hero p{
font-size:16px;
}

}

</style>

</head>

<body>

<header>
<div class="logo">👑 DE <span>STORE</span></div>
</header>

<section class="hero">

<div class="hero-content">

<h1>أفضل متجر في الجزائر</h1>

<p>
منتجات أصلية + أسعار مناسبة + توصيل إلى 58 ولاية
</p>

<a href="#products" class="btn">ابدأ التسوق</a>

</div>

</section>

</body>
</html>
