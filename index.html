<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"><title>👑 DZ STORE</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0f1115;
color:white;
overflow-x:hidden;
}

/* TOP BAR */

.top-bar{
background:#00e676;
color:black;
padding:10px;
text-align:center;
font-weight:bold;
}

/* HEADER */

header{
background:#11151d;
padding:15px;
border-bottom:1px solid #222;
position:sticky;
top:0;
z-index:999;
}

.logo-box{
display:flex;
flex-direction:column;
align-items:center;
}

.logo-icon{
font-size:42px;
}

.logo-text{
font-size:28px;
font-weight:800;
color:#00e676;
}

/* NAV */

.nav{
display:flex;
justify-content:center;
gap:15px;
margin-top:15px;
flex-wrap:wrap;
}

.nav a{
color:white;
text-decoration:none;
padding:8px 14px;
border-radius:8px;
transition:.3s;
}

.nav a:hover{
background:#00e676;
color:black;
}

/* HERO */

.hero{
position:relative;
height:450px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-content h1{
font-size:42px;
margin-bottom:10px;
}

.hero-content p{
font-size:18px;
color:#ddd;
margin-bottom:20px;
}

.hero-btn{
background:#00e676;
color:black;
padding:12px 25px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.section-title{
text-align:center;
font-size:30px;
font-weight:800;
margin:40px 0 20px;
color:#00e676;
}

</style></head><body><div class="top-bar">
🚚 توصيل إلى 58 ولاية | 💵 الدفع عند الاستلام | ✅ منتجات مختارة بعناية
</div><header><div class="logo-box"><div class="logo-icon">👑</div><div class="logo-text">
DZ STORE
</div></div><div class="nav"><a href="#products">المنتجات</a>

<a href="#about">من نحن</a>

<a href="#contact">اتصل بنا</a>

</div></header><section class="hero"><div class="slide active">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1400">
</div><div class="slide">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=1400">
</div><div class="slide">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=1400">
</div><div class="overlay"><div class="hero-content"><h1>مرحباً بك في DZ STORE</h1><p>
أفضل العروض والمنتجات مع التوصيل إلى جميع ولايات الجزائر
</p><a href="#products" class="hero-btn">
تسوق الآن
</a></div></div></section>
  <!-- SEARCH --><section style="padding:30px 15px"><div style="text-align:center"><input
type="text"
id="searchInput"
placeholder="🔍 ابحث عن منتج..."
onkeyup="renderProducts()"
style="
width:90%;
max-width:500px;
padding:14px;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
">

</div><!-- CATEGORIES --><div style="
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
"><button onclick="setCategory('all')"
class="cat-btn">
الكل
</button>

<button onclick="setCategory('electronics')"
class="cat-btn">
إلكترونيات
</button>

<button onclick="setCategory('home')"
class="cat-btn">
منزل
</button>

<button onclick="setCategory('sport')"
class="cat-btn">
رياضة
</button>

<button onclick="setCategory('beauty')"
class="cat-btn">
جمال
</button>

</div></section><style>

.cat-btn{
padding:10px 18px;
border:none;
border-radius:10px;
background:#1b1f2a;
color:white;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.cat-btn:hover{
background:#00e676;
color:black;
}

.products-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

@media(max-width:900px){

.products-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.products-grid{
grid-template-columns:1fr;
}

}

.product-card{
background:#111826;
border-radius:15px;
overflow:hidden;
transition:.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

.product-card img{
width:100%;
height:250px;
object-fit:cover;
cursor:pointer;
}

.product-info{
padding:15px;
}

.product-name{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.product-price{
color:#00e676;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.command-btn{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#00e676;
color:black;
font-weight:bold;
cursor:pointer;
}

</style><!-- PRODUCTS --><section id="products"><h2 class="section-title">
🔥 المنتجات
</h2><div id="productsGrid"
class="products-grid">
</div></section>
