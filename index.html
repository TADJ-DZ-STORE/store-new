<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 DE STORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0b0b;
color:white;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:1000;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(10px);
padding:15px;
border-bottom:1px solid #00e676;
}

.logo{
text-align:center;
font-size:36px;
font-weight:bold;
color:#00e676;
letter-spacing:2px;
}

.logo span{
color:#ffd700;
}

/* HERO */
.hero{
height:520px;
background:url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1600&q=80")
center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:55px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
color:#ddd;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:14px 30px;
background:linear-gradient(135deg,#00e676,#00c853);
color:black;
font-weight:bold;
border-radius:12px;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* CONTAINER */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* SEARCH */
.search-box{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:25px 0;
}

.search-box input,
.search-box select{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#151515;
border-radius:15px;
overflow:hidden;
transition:0.3s;
border:1px solid #222;
}

.card:hover{
transform:translateY(-8px);
border-color:#00e676;
}

.card img{
width:100%;
height:230px;
object-fit:cover;
cursor:pointer;
transition:0.3s;
}

.card img:hover{
transform:scale(1.05);
}

.info{
padding:15px;
}

.info h3{
font-size:18px;
margin-bottom:5px;
}

.price{
color:#00e676;
font-size:20px;
font-weight:bold;
margin:10px 0;
}

.btn-order{
display:block;
text-align:center;
padding:12px;
background:#25D366;
color:white;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn-order:hover{
background:#1ebe5d;
transform:scale(1.03);
}

</style>

</head>

<body>

<header>
<div class="logo">👑 DE STORE</div>
</header>

<section class="hero">

<div class="hero-content">

<h1>أفضل متجر في الجزائر</h1>
<p>منتجات عالية الجودة + توصيل لجميع الولايات</p>

<a href="#products" class="btn">ابدأ التسوق</a>

</div>

</section>

<div class="container">
