<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DZ STORE</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f10;color:white;direction:rtl}
header{padding:20px;text-align:center;background:#000;font-size:26px}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1b1b1d;
border-radius:12px;
overflow:hidden;
cursor:pointer;
}

img{width:100%;height:180px;object-fit:cover}

.card-body{padding:10px}
.price{color:#00ff88;font-weight:bold}

a{text-decoration:none;color:white}
</style>
</head>

<body>

<header>🛒 DZ STORE</header>

<a href="admin.html" style="display:block;text-align:center;color:#00ff88;margin:10px">
⚙ الدخول إلى لوحة التحكم
</a>

<div class="container" id="box"></div>

<script src="products.js"></script>

<script>
let box=document.getElementById("box");

function render(){
box.innerHTML="";
products.forEach(p=>{
box.innerHTML+=`
<a href="product.html?id=${p.id}">
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<div class="price">${p.price} دج</div>
</div>
</div>
</a>
`;
});
}
render();
</script>

</body>
</html>
