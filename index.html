<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري الإلكتروني</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f1f3f6;
    direction: rtl;
}

/* الهيدر */
header{
    background: linear-gradient(135deg,#111,#333);
    color:white;
    text-align:center;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

/* المنتجات */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

.product{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.product:hover{
    transform:scale(1.03);
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.product-content{
    padding:10px;
}

.product h3{
    margin:5px 0;
}

.product p{
    color:#555;
    font-size:14px;
}

.price{
    color:green;
    font-weight:bold;
    margin:5px 0;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#111;
    color:white;
    cursor:pointer;
    border-radius:0 0 15px 15px;
}

button:hover{
    background:#444;
}

/* الفورم */
#formBox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

form{
    background:white;
    padding:20px;
    border-radius:12px;
    width:300px;
}

form input{
    width:100%;
    padding:8px;
    margin:5px 0;
}

.close{
    background:red;
    margin-top:5px;
}
</style>
</head>

<body>

<header>🛒 متجر إلكتروني احترافي</header>

<!-- 🟢 المنتجات -->
<div class="container">

    <!-- منتج 1 -->
    <div class="product">
        <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
        <div class="product-content">
            <h3>حذاء رياضي</h3>
            <p>حذاء مريح للجري والاستخدام اليومي</p>
            <div class="price">4500 دج</div>
        </div>
        <button onclick="openForm('حذاء رياضي')">شراء</button>
    </div>

    <!-- منتج 2 -->
    <div class="product">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
        <div class="product-content">
            <h3>ساعة يد</h3>
            <p>ساعة أنيقة بجودة عالية</p>
            <div class="price">6000 دج</div>
        </div>
        <button onclick="openForm('ساعة يد')">شراء</button>
    </div>

    <!-- منتج 3 -->
    <div class="product">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
        <div class="product-content">
            <h3>سماعات</h3>
            <p>صوت نقي وجودة عالية</p>
            <div class="price">3000 دج</div>
        </div>
        <button onclick="openForm('سماعات')">شراء</button>
    </div>

</div>

<!-- 🟡 نموذج الطلب -->
<div id="formBox">
<form onsubmit="sendOrder(event)">
    <h3 id="productName">طلب المنتج</h3>

    <input type="text" placeholder="الاسم الكامل" required>
    <input type="text" placeholder="رقم الهاتف" required>
    <input type="text" placeholder="الولاية" required>
    <input type="text" placeholder="البلدية" required>
    <input type="text" placeholder="العنوان الكامل" required>

    <button type="submit">تأكيد الطلب</button>
    <button type="button" class="close" onclick="closeForm()">إغلاق</button>
</form>
</div>

<script>
function openForm(name){
    document.getElementById("productName").innerText = "طلب: " + name;
    document.getElementById("formBox").style.display = "flex";
}

function closeForm(){
    document.getElementById("formBox").style.display = "none";
}

function sendOrder(e){
    e.preventDefault();
    alert("تم إرسال الطلب بنجاح ✅");
    closeForm();
}
</script>

</body>
</html>
