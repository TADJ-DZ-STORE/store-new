<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DZ STORE Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0b0b;color:#fff}
header{background:#000;padding:15px;text-align:center;position:sticky;top:0}
.logo{color:#00e676;font-size:30px;font-weight:bold}
.hero{padding:60px 20px;text-align:center;background:linear-gradient(135deg,#000,#222)}
.hero h1{font-size:40px}
.hero p{margin:15px 0;color:#ccc}
.btn{background:#00c853;color:#fff;padding:12px 25px;border-radius:8px;text-decoration:none}
.container{max-width:1200px;margin:auto;padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card{background:#181818;border-radius:15px;overflow:hidden}
.card img{width:100%;height:250px;object-fit:cover}
.info{padding:15px}
.price{color:#00e676;font-size:22px;font-weight:bold}
.section{margin-top:40px}
form{background:#181818;padding:20px;border-radius:15px}
input,select,textarea{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px}
button{width:100%;padding:14px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:18px}
.reviews{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.review{background:#181818;padding:15px;border-radius:10px}
footer{text-align:center;padding:20px;background:#000;margin-top:40px}
</style>
</head>
<body>

<header><div class="logo">DZ STORE Premium</div></header>

<section class="hero">
<h1>أفضل العروض في الجزائر</h1>
<p>الدفع عند الاستلام - توصيل 58 ولاية</p>
<a class="btn" href="#order">اطلب الآن</a>
</section>

<div class="container">

<h2>المنتجات</h2>
<div class="products">
<div class="card">
<img src="https://picsum.photos/500/300?1">
<div class="info"><h3>منتج مميز</h3><div class="price">3500 دج</div></div>
</div>

<div class="card">
<img src="https://picsum.photos/500/300?2">
<div class="info"><h3>منتج ثاني</h3><div class="price">4500 دج</div></div>
</div>

<div class="card">
<img src="https://picsum.photos/500/300?3">
<div class="info"><h3>منتج ثالث</h3><div class="price">5500 دج</div></div>
</div>
</div>

<div class="section" id="order">
<h2>نموذج الطلب</h2>
<form onsubmit="sendOrder();return false;">
<input id="name" placeholder="الاسم الكامل" required>
<input id="phone" placeholder="رقم الهاتف" required>

<select id="wilaya">
<option>أدرار</option><option>الشلف</option><option>الأغواط</option><option>أم البواقي</option>
<option>باتنة</option><option>بجاية</option><option>بسكرة</option><option>بشار</option>
<option>البليدة</option><option>البويرة</option><option>تمنراست</option><option>تبسة</option>
<option>تلمسان</option><option>تيارت</option><option>تيزي وزو</option><option>الجزائر</option>
<option>الجلفة</option><option>جيجل</option><option>سطيف</option><option>سعيدة</option>
<option>سكيكدة</option><option>سيدي بلعباس</option><option>عنابة</option><option>قالمة</option>
<option>قسنطينة</option><option>المدية</option><option>مستغانم</option><option>المسيلة</option>
<option>معسكر</option><option>ورقلة</option><option>وهران</option><option>البيض</option>
<option>إليزي</option><option>برج بوعريريج</option><option>بومرداس</option><option>الطارف</option>
<option>تندوف</option><option>تيسمسيلت</option><option>الوادي</option><option>خنشلة</option>
<option>سوق أهراس</option><option>تيبازة</option><option>ميلة</option><option>عين الدفلى</option>
<option>النعامة</option><option>عين تموشنت</option><option>غرداية</option><option>غليزان</option>
<option>تيميمون</option><option>برج باجي مختار</option><option>أولاد جلال</option>
<option>بني عباس</option><option>عين صالح</option><option>عين قزام</option>
<option>تقرت</option><option>جانت</option><option>المغير</option><option>المنيعة</option>
</select>

<input id="address" placeholder="العنوان الكامل">
<input id="qty" type="number" value="1" min="1">
<textarea id="note" placeholder="ملاحظات إضافية"></textarea>
<button>إرسال الطلب</button>
</form>
</div>

<div class="section">
<h2>آراء العملاء</h2>
<div class="reviews">
<div class="review">⭐⭐⭐⭐⭐ خدمة ممتازة</div>
<div class="review">⭐⭐⭐⭐⭐ توصيل سريع</div>
<div class="review">⭐⭐⭐⭐⭐ منتج رائع</div>
</div>
</div>

</div>

<footer>© DZ STORE Premium 2026</footer>

<script>
function sendOrder(){
let msg=`🛒 طلب جديد - DZ STORE Premium

👤 الاسم: ${name.value}
📞 الهاتف: ${phone.value}
🏙 الولاية: ${wilaya.value}
📍 العنوان: ${address.value}
🔢 الكمية: ${qty.value}
📝 ملاحظات: ${note.value}`;
window.open("https://wa.me/213775123025?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
