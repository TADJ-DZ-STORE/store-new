<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>👑 DZ STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#0f1115;
color:#fff;
overflow-x:hidden;
}

/* TOP BAR */

.top-bar{
background:#00d26a;
color:#000;
font-weight:700;
padding:10px;
text-align:center;
font-size:14px;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:999;
background:#11151d;
border-bottom:1px solid #1f2937;
padding:15px;
}

.logo-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.logo-icon{
font-size:42px;
}

.logo-text{
font-size:28px;
font-weight:800;
color:#00e676;
letter-spacing:2px;
}

/* NAV */

.nav{
display:flex;
justify-content:center;
gap:15px;
margin-top:15px;
flex-wrap:wrap;
}

.nav a{
color:white;
text-decoration:none;
padding:8px 14px;
border-radius:8px;
transition:.3s;
}

.nav a:hover{
background:#00e676;
color:#000;
}

/* HERO */

.hero{
position:relative;
height:450px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content h1{
font-size:42px;
margin-bottom:10px;
}

.hero-content p{
font-size:18px;
margin-bottom:20px;
color:#ddd;
}

.hero-btn{
background:#00e676;
color:#000;
padding:12px 25px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

/* SECTION TITLE */

.section-title{
text-align:center;
font-size:30px;
font-weight:800;
margin:40px 0 20px;
color:#00e676;
}

</style>
</head>

<body>

<div class="top-bar">
🚚 توصيل إلى 58 ولاية | 💵 الدفع عند الاستلام | ✅ منتجات مختارة بعناية
</div>

<header>

<div class="logo-box">

<div class="logo-icon">👑</div>

<div class="logo-text">
DZ STORE
</div>

</div>

<div class="nav">

<a href="#products">المنتجات</a>

<a href="#categories">التصنيفات</a>

<a href="#about">من نحن</a>

<a href="#contact">اتصل بنا</a>

</div>

</header>

<section class="hero">

<div class="slide active">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1400">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=1400">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=1400">
</div>

<div class="overlay">

<div class="hero-content">

<h1>مرحباً بك في DZ STORE</h1>

<p>
أفضل العروض والمنتجات مع التوصيل إلى جميع ولايات الجزائر
</p>

<a href="#products" class="hero-btn">
تسوق الآن
</a>

</div>

</div>

  </section>
  <!-- SEARCH -->
<div style="text-align:center; padding:20px">

<input id="searchInput"
placeholder="ابحث عن منتج..."
onkeyup="renderProducts()"
style="padding:10px;width:80%;border-radius:10px;border:none">

</div>

<!-- CATEGORIES -->
<div style="text-align:center">

<button onclick="setCategory('all')">الكل</button>
<button onclick="setCategory('electronics')">إلكترونيات</button>
<button onclick="setCategory('home')">منزل</button>

</div>

<!-- PRODUCTS -->
<h2 style="text-align:center;color:#00e676;margin-top:20px">
المنتجات
</h2>

<div id="productsGrid"
style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;padding:20px">
</div>
  <!-- SEARCH + CATEGORIES -->
<section class="controls">

<div class="search-box">
<input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج..." onkeyup="filterProducts()">
</div>

<div class="categories">
<button onclick="setCategory('all')">الكل</button>
<button onclick="setCategory('electronics')">إلكترونيات</button>
<button onclick="setCategory('home')">منزل</button>
<button onclick="setCategory('sport')">رياضة</button>
<button onclick="setCategory('car')">سيارات</button>
<button onclick="setCategory('beauty')">جمال</button>
</div>

</section>

<!-- PRODUCTS -->
<section id="products">

<h2 class="section-title">🔥 الأكثر مبيعًا</h2>

<div class="products-grid" id="productsGrid"></div>

</section>
<script>

let currentCategory = "all";

const products = [
{
name:"Smart Watch",
category:"electronics",
price:3500,
image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500"
},
{
name:"Headphones",
category:"electronics",
price:4500,
image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
},
{
name:"Blender",
category:"home",
price:5500,
image:"https://images.unsplash.com/photo-1570222094114-d054a817e56b?w=500"
}
];

function renderProducts(){

let box=document.getElementById("productsGrid");
let search=document.getElementById("searchInput").value.toLowerCase();

box.innerHTML="";

products.forEach(p=>{

if(
(currentCategory==="all" || p.category===currentCategory) &&
p.name.toLowerCase().includes(search)
){

box.innerHTML += `
<div style="background:#111;padding:10px;border-radius:10px">
<img src="${p.image}" style="width:100%;border-radius:10px">
<h3>${p.name}</h3>
<p style="color:#00e676">${p.price} دج</p>
<button onclick="openOrder('${p.name}',${p.price})"
style="width:100%;padding:10px;background:#00e676;border:none;border-radius:8px">
Commander
</button>
</div>
`;

}

});

}

function setCategory(cat){
currentCategory=cat;
renderProducts();
}

renderProducts();

</script>
<script>

function openOrder(name, price){

let msg = `
🛒 طلب جديد - DZ STORE

📦 المنتج: ${name}
💰 السعر: ${price} دج

👤 الاسم: ضع اسمك هنا
📞 الهاتف: ضع رقمك
🏙 الولاية: ضع ولايتك
📍 العنوان: ضع العنوان
🔢 الكمية: 1
`;

window.open(
"https://wa.me/213775123025?text=" + encodeURIComponent(msg),
"_blank"
);

}

</script>
