<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>👑 DZ STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#0f1115;
color:#fff;
overflow-x:hidden;
}

/* TOP BAR */

.top-bar{
background:#00d26a;
color:#000;
font-weight:700;
padding:10px;
text-align:center;
font-size:14px;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:999;
background:#11151d;
border-bottom:1px solid #1f2937;
padding:15px;
}

.logo-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.logo-icon{
font-size:42px;
}

.logo-text{
font-size:28px;
font-weight:800;
color:#00e676;
letter-spacing:2px;
}

/* NAV */

.nav{
display:flex;
justify-content:center;
gap:15px;
margin-top:15px;
flex-wrap:wrap;
}

.nav a{
color:white;
text-decoration:none;
padding:8px 14px;
border-radius:8px;
transition:.3s;
}

.nav a:hover{
background:#00e676;
color:#000;
}

/* HERO */

.hero{
position:relative;
height:450px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content h1{
font-size:42px;
margin-bottom:10px;
}

.hero-content p{
font-size:18px;
margin-bottom:20px;
color:#ddd;
}

.hero-btn{
background:#00e676;
color:#000;
padding:12px 25px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

/* SECTION TITLE */

.section-title{
text-align:center;
font-size:30px;
font-weight:800;
margin:40px 0 20px;
color:#00e676;
}

</style>
</head>

<body>

<div class="top-bar">
🚚 توصيل إلى 58 ولاية | 💵 الدفع عند الاستلام | ✅ منتجات مختارة بعناية
</div>

<header>

<div class="logo-box">

<div class="logo-icon">👑</div>

<div class="logo-text">
DZ STORE
</div>

</div>

<div class="nav">

<a href="#products">المنتجات</a>

<a href="#categories">التصنيفات</a>

<a href="#about">من نحن</a>

<a href="#contact">اتصل بنا</a>

</div>

</header>

<section class="hero">

<div class="slide active">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1400">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=1400">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=1400">
</div>

<div class="overlay">

<div class="hero-content">

<h1>مرحباً بك في DZ STORE</h1>

<p>
أفضل العروض والمنتجات مع التوصيل إلى جميع ولايات الجزائر
</p>

<a href="#products" class="hero-btn">
تسوق الآن
</a>

</div>

</div>

  </section>
