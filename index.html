<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 DE STORE</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0e1117;
color:white;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:1000;
background:#0b0f14;
padding:15px;
border-bottom:1px solid #1f2937;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#00ff88;
}

.search{
width:50%;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

/* HERO SMALL */
.hero{
padding:40px 20px;
text-align:center;
background:linear-gradient(180deg,#0b0f14,#0e1117);
}

.hero h1{
font-size:34px;
margin-bottom:10px;
}

.hero p{
color:#aaa;
}

/* PRODUCTS GRID */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;
}

/* CARD */
.card{
background:#111827;
border:1px solid #1f2937;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#00ff88;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.info{
padding:12px;
}

.price{
color:#00ff88;
font-size:18px;
margin:8px 0;
font-weight:bold;
}

.btn{
display:block;
text-align:center;
padding:10px;
background:#00ff88;
color:black;
border-radius:10px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.box{
background:#111827;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

.box input,
.box select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

.box button{
width:100%;
padding:12px;
background:#00ff88;
border:none;
border-radius:10px;
font-weight:bold;
}

.close{
text-align:right;
color:red;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<div class="logo">👑 DE STORE</div>
<input class="search" placeholder="ابحث عن منتج..." onkeyup="search(this.value)">
</header>

<section class="hero">
<h1>متجر احترافي بسيط وسريع</h1>
<p>اطلب أي منتج في ثواني</p>
</section>

<div class="container">

<div class="products" id="products"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<div class="box">

<div class="close" onclick="closePopup()">✖</div>

<h3>إتمام الطلب</h3>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="الهاتف">

<select id="wilaya">
<option>الجزائر</option>
<option>سطيف</option>
<option>وهران</option>
<option>قسنطينة</option>
<option>باتنة</option>
</select>

<input id="address" placeholder="العنوان">

<button onclick="send()">إرسال واتساب</button>

</div>

</div>

<script>

/* PRODUCTS */
const products=[
{name:"Smart Watch",price:3500,img:"images/watch.jpg"},
{name:"Headphones",price:4500,img:"images/headphones.jpg"},
{name:"Blender",price:5500,img:"images/blender.jpg"}
];

let selected=null;

/* SHOW */
function show(list=products){

let box=document.getElementById("products");
box.innerHTML="";

list.forEach((p,i)=>{

box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<div class="price">${p.price} دج</div>
<button class="btn" onclick="openP(${i})">Commander</button>
</div>
</div>
`;

});

}

show();

/* SEARCH */
function search(v){
let res=products.filter(p=>p.name.toLowerCase().includes(v.toLowerCase()));
show(res);
}

/* POPUP */
function openP(i){
selected=products[i];
popup.style.display="flex";
}

function closePopup(){
popup.style.display="none";
}

/* SEND */
function send(){

let msg=
"🛒 طلب جديد - DE STORE\n\n"+
"📦 المنتج: "+selected.name+"\n"+
"💰 السعر: "+selected.price+"\n\n"+
"👤 الاسم: "+name.value+"\n"+
"📞 الهاتف: "+phone.value+"\n"+
"🏙 الولاية: "+wilaya.value+"\n"+
"📍 العنوان: "+address.value;

window.open("https://wa.me/213775123025?text="+encodeURIComponent(msg));

}

</script>

</body>
</html>
